openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Community Hero – Intelligent Issue Resolution API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: complaints
    description: Complaint submission and management
  - name: departments
    description: Department management
  - name: workers
    description: Worker management
  - name: analytics
    description: Analytics and reporting
  - name: assets
    description: Public asset management and QR verification
  - name: auth
    description: Authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /complaints:
    get:
      operationId: listComplaints
      tags: [complaints]
      summary: List complaints
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
        - in: query
          name: departmentId
          schema: { type: integer }
        - in: query
          name: publicAssetId
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintList"
    post:
      operationId: submitComplaint
      tags: [complaints]
      summary: Submit a new complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintInput"
      responses:
        "201":
          description: Complaint submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintDetail"

  /complaints/{id}:
    get:
      operationId: getComplaint
      tags: [complaints]
      summary: Get complaint by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Complaint detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /complaints/ticket/{ticketId}:
    get:
      operationId: getComplaintByTicket
      tags: [complaints]
      summary: Get complaint by ticket ID
      parameters:
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Complaint detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /complaints/{id}/analyze:
    post:
      operationId: analyzeComplaint
      tags: [complaints]
      summary: Run AI analysis on a complaint
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /complaints/{id}/assign:
    post:
      operationId: assignWorker
      tags: [complaints]
      summary: Assign nearest qualified worker
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /complaints/{id}/verify:
    post:
      operationId: verifyCompletion
      tags: [complaints]
      summary: AI verification of completion
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"

  /complaints/{id}/citizen-feedback:
    post:
      operationId: submitCitizenFeedback
      tags: [complaints]
      summary: Citizen rates and verifies resolution
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitizenFeedbackInput"
      responses:
        "200":
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /workers:
    get:
      operationId: listWorkers
      tags: [workers]
      summary: List workers
      parameters:
        - in: query
          name: departmentId
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string }
      responses:
        "200":
          description: List of workers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Worker"
    post:
      operationId: createWorker
      tags: [workers]
      summary: Register a worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"

  /workers/{id}/location:
    patch:
      operationId: updateWorkerLocation
      tags: [workers]
      summary: Update worker GPS location
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get platform analytics summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/heatmap:
    get:
      operationId: getHeatmap
      tags: [analytics]
      summary: Get complaint heatmap data
      responses:
        "200":
          description: Heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeatmapPoint"

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all public assets
      parameters:
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: departmentId
          schema: { type: integer }
        - in: query
          name: ward
          schema: { type: string }
        - in: query
          name: minHealth
          schema: { type: number }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetList"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Register a new public asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDetail"

  /assets/qr/{assetCode}:
    get:
      operationId: getAssetByCode
      tags: [assets]
      summary: Lookup asset by QR code / asset code (for citizen scanning)
      parameters:
        - in: path
          name: assetCode
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Asset detail with pre-filled complaint data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDetail"
        "404":
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assets/{id}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset detail with maintenance history
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAsset
      tags: [assets]
      summary: Update asset details
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetUpdate"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDetail"

  /assets/{id}/complaints:
    get:
      operationId: getAssetComplaints
      tags: [assets]
      summary: Get all complaints for a specific asset
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: List of complaints for this asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplaintList"

  /assets/{id}/verify-officer:
    post:
      operationId: verifyOfficerProximity
      tags: [assets]
      summary: Verify officer is within 20m of the asset (anti-fraud GPS check)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfficerProximityInput"
      responses:
        "200":
          description: Proximity verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficerProximityResult"

  /assets/summary/stats:
    get:
      operationId: getAssetStats
      tags: [assets]
      summary: Get asset health summary and stats for admin dashboard
      responses:
        "200":
          description: Asset statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
      required: [success]

    ComplaintInput:
      type: object
      properties:
        publicAssetId: { type: ["integer", "null"] }
        citizenName: { type: ["string", "null"] }
        citizenPhone: { type: ["string", "null"] }
        citizenEmail: { type: ["string", "null"] }
        isAnonymous: { type: boolean }
        description: { type: ["string", "null"] }
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }
        address: { type: ["string", "null"] }
        ward: { type: ["string", "null"] }
        imageBase64: { type: ["string", "null"] }

    ComplaintDetail:
      type: object
      required: [id, ticketId, status, createdAt]
      properties:
        id: { type: integer }
        ticketId: { type: string }
        publicAssetId: { type: ["integer", "null"] }
        citizenName: { type: ["string", "null"] }
        citizenPhone: { type: ["string", "null"] }
        isAnonymous: { type: boolean }
        description: { type: ["string", "null"] }
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }
        address: { type: ["string", "null"] }
        ward: { type: ["string", "null"] }
        status: { type: string }
        priority: { type: ["string", "null"] }
        priorityScore: { type: ["number", "null"] }
        departmentId: { type: ["integer", "null"] }
        assignedWorkerId: { type: ["integer", "null"] }
        estimatedResolutionHours: { type: ["number", "null"] }
        resolvedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    ComplaintList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ComplaintDetail"
        total: { type: integer }

    AiAnalysisResult:
      type: object
      required: [complaintId, issueCategory]
      properties:
        complaintId: { type: integer }
        issueCategory: { type: ["string", "null"] }
        issueDescription: { type: ["string", "null"] }
        detectedObjects:
          type: array
          items: { type: string }
        suggestedDepartment: { type: ["string", "null"] }
        severity: { type: ["string", "null"] }
        confidence: { type: ["number", "null"] }
        estimatedResolutionHours: { type: ["number", "null"] }
        equipmentRequired:
          type: array
          items: { type: string }
        workersRequired: { type: ["integer", "null"] }
        requiredSkills:
          type: array
          items: { type: string }
        emergencyLevel: { type: ["string", "null"] }

    AssignmentResult:
      type: object
      required: [assignmentId, workerId, workerName]
      properties:
        assignmentId: { type: integer }
        workerId: { type: integer }
        workerName: { type: string }
        workerPhone: { type: string }
        distanceKm: { type: ["number", "null"] }
        estimatedArrivalMinutes: { type: ["number", "null"] }

    VerificationInput:
      type: object
      properties:
        workerNotes: { type: ["string", "null"] }
        beforeImageBase64: { type: ["string", "null"] }
        afterImageBase64: { type: ["string", "null"] }

    VerificationResult:
      type: object
      required: [verdict, confidence]
      properties:
        verdict: { type: string }
        confidence: { type: number }
        aiNotes: { type: ["string", "null"] }
        isEscalated: { type: boolean }
        escalationReason: { type: ["string", "null"] }

    CitizenFeedbackInput:
      type: object
      properties:
        citizenVerified: { type: boolean }
        citizenRating: { type: ["integer", "null"] }
        citizenComment: { type: ["string", "null"] }

    Department:
      type: object
      required: [id, name, code]
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        description: { type: ["string", "null"] }
        headName: { type: ["string", "null"] }
        headPhone: { type: ["string", "null"] }
        isActive: { type: boolean }
        issueTypes:
          type: array
          items: { type: string }
        createdAt: { type: string }

    DepartmentInput:
      type: object
      required: [name, code]
      properties:
        name: { type: string }
        code: { type: string }
        description: { type: ["string", "null"] }
        headName: { type: ["string", "null"] }
        headEmail: { type: ["string", "null"] }
        headPhone: { type: ["string", "null"] }
        issueTypes:
          type: array
          items: { type: string }

    Worker:
      type: object
      required: [id, name, phone, departmentId, status]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        departmentId: { type: integer }
        status: { type: string }
        skills:
          type: array
          items: { type: string }
        currentLatitude: { type: ["number", "null"] }
        currentLongitude: { type: ["number", "null"] }
        activeComplaintCount: { type: integer }
        totalResolved: { type: integer }
        avgRating: { type: ["number", "null"] }
        isActive: { type: boolean }

    WorkerInput:
      type: object
      required: [name, phone, departmentId]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        departmentId: { type: integer }
        skills:
          type: array
          items: { type: string }
        certifications:
          type: array
          items: { type: string }
        currentLatitude: { type: ["number", "null"] }
        currentLongitude: { type: ["number", "null"] }

    LocationUpdate:
      type: object
      required: [latitude, longitude]
      properties:
        latitude: { type: number }
        longitude: { type: number }
        address: { type: ["string", "null"] }

    AnalyticsSummary:
      type: object
      required: [totalComplaints, resolvedComplaints, resolutionRate, avgResolutionHours, activeWorkers, totalDepartments]
      properties:
        totalComplaints: { type: integer }
        resolvedComplaints: { type: integer }
        resolutionRate: { type: number }
        avgResolutionHours: { type: number }
        activeWorkers: { type: integer }
        totalDepartments: { type: integer }
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        byPriority:
          type: array
          items:
            $ref: "#/components/schemas/PriorityCount"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count: { type: integer }

    PriorityCount:
      type: object
      required: [priority, count]
      properties:
        priority: { type: string }
        count: { type: integer }

    HeatmapPoint:
      type: object
      required: [latitude, longitude, weight]
      properties:
        latitude: { type: number }
        longitude: { type: number }
        weight: { type: number }
        category: { type: ["string", "null"] }

    AssetInput:
      type: object
      required: [name, type, latitude, longitude]
      properties:
        assetCode: { type: ["string", "null"] }
        name: { type: string }
        type: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        address: { type: ["string", "null"] }
        ward: { type: ["string", "null"] }
        departmentId: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }

    AssetUpdate:
      type: object
      properties:
        name: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        ward: { type: ["string", "null"] }
        departmentId: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        isActive: { type: ["boolean", "null"] }

    AssetDetail:
      type: object
      required: [id, assetCode, name, type, latitude, longitude, healthScore]
      properties:
        id: { type: integer }
        assetCode: { type: string }
        name: { type: string }
        type: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        address: { type: ["string", "null"] }
        ward: { type: ["string", "null"] }
        departmentId: { type: ["integer", "null"] }
        departmentName: { type: ["string", "null"] }
        qrSignature: { type: ["string", "null"] }
        healthScore: { type: number }
        installedAt: { type: ["string", "null"] }
        lastMaintainedAt: { type: ["string", "null"] }
        totalComplaints: { type: integer }
        totalMaintenanceVisits: { type: integer }
        avgCitizenRating: { type: ["number", "null"] }
        isActive: { type: boolean }
        notes: { type: ["string", "null"] }
        createdAt: { type: string }
        recentComplaints:
          type: array
          items:
            $ref: "#/components/schemas/ComplaintDetail"

    AssetList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AssetDetail"
        total: { type: integer }

    OfficerProximityInput:
      type: object
      required: [latitude, longitude]
      properties:
        latitude: { type: number }
        longitude: { type: number }
        officerId: { type: ["integer", "null"] }

    OfficerProximityResult:
      type: object
      required: [verified, distanceMeters]
      properties:
        verified: { type: boolean }
        distanceMeters: { type: number }
        message: { type: string }

    AssetStats:
      type: object
      required: [totalAssets, activeAssets, avgHealthScore, criticalAssets]
      properties:
        totalAssets: { type: integer }
        activeAssets: { type: integer }
        avgHealthScore: { type: number }
        criticalAssets: { type: integer }
        byType:
          type: array
          items:
            $ref: "#/components/schemas/AssetTypeCount"
        lowestHealthAssets:
          type: array
          items:
            $ref: "#/components/schemas/AssetDetail"

    AssetTypeCount:
      type: object
      required: [type, count]
      properties:
        type: { type: string }
        count: { type: integer }
        avgHealth: { type: number }
